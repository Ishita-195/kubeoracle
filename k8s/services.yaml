# ============================================================
# KubeOracle — Kubernetes Deployments for Demo Services
# Apply with: kubectl apply -f k8s/
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: kubeoracle
  labels:
    app: kubeoracle

---
# Payment Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: kubeoracle
  labels:
    app: payment-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: payment-service
          image: nginx:alpine      # placeholder image for demo
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: SERVICE_NAME
              value: "payment-service"
            - name: UPSTREAM_AUTH
              value: "http://auth-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: kubeoracle
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080

---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kubeoracle
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: auth-service
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"       # Intentionally low for demo OOMKill story
          env:
            - name: SERVICE_NAME
              value: "auth-service"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kubeoracle
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080

---
# User Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: kubeoracle
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: kubeoracle
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080

---
# Notification Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: kubeoracle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kubeoracle
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080
