# ─────────────────────────────────────────────────────────────
# KubeOracle – CI/CD Pipeline
# Triggers: push to main or PR
# Steps: build → test → push → deploy (main only)
# ─────────────────────────────────────────────────────────────

name: KubeOracle CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/kubeoracle-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kubeoracle-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Job 1: Lint & Test ──────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          ANTHROPIC_API_KEY: test-key-for-ci
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests found, skipping"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint || echo "No lint script, skipping"

      - name: Build frontend (smoke test)
        run: |
          cd frontend
          npm run build

  # ─── Job 2: Build & Push Images ─────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      backend-tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend.Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend.Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Cluster (main only) ───────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace & config
        run: |
          kubectl apply -f devops/k8s/namespaces/
          kubectl apply -f devops/k8s/configmaps/

      - name: Update backend image tag
        run: |
          kubectl set image deployment/kubeoracle-backend \
            backend=${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }} \
            -n kubeoracle

      - name: Update frontend image tag
        run: |
          kubectl set image deployment/kubeoracle-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }} \
            -n kubeoracle

      - name: Wait for rollout (backend)
        run: |
          kubectl rollout status deployment/kubeoracle-backend \
            -n kubeoracle --timeout=120s

      - name: Wait for rollout (frontend)
        run: |
          kubectl rollout status deployment/kubeoracle-frontend \
            -n kubeoracle --timeout=120s

      - name: Apply demo services
        run: |
          kubectl apply -f devops/k8s/demo-services/

      - name: Smoke test
        run: |
          # Get the Minikube IP and test the backend health endpoint
          BACKEND_PORT=$(kubectl get svc kubeoracle-backend -n kubeoracle \
            -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "8000")
          echo "Deploy complete. Backend on port $BACKEND_PORT"

      - name: Notify success
        if: success()
        run: |
          echo "✅ KubeOracle deployed successfully!"
          echo "SHA: ${{ github.sha }}"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}"
