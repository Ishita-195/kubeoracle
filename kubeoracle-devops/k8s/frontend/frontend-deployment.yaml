# ─────────────────────────────────────────────────────────────
# KubeOracle – Frontend (React + Nginx) Deployment
# 2 replicas, liveness/readiness probes
# ─────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeoracle-frontend
  namespace: kubeoracle
  labels:
    app: kubeoracle-frontend
    app.kubernetes.io/part-of: kubeoracle
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeoracle-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kubeoracle-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ishu195/kubeoracle-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: kubeoracle-frontend
  namespace: kubeoracle
  labels:
    app: kubeoracle-frontend
spec:
  type: NodePort
  selector:
    app: kubeoracle-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
