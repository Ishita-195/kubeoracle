# ─────────────────────────────────────────────────────────────
# KubeOracle – ConfigMaps
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeoracle-config
  namespace: kubeoracle
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  PROMETHEUS_URL: "http://prometheus.kubeoracle-monitoring.svc.cluster.local:9090"
  CORS_ORIGINS: "*"

---
# ─────────────────────────────────────────────────────────────
# KubeOracle – Secrets (base64-encoded placeholders)
# Replace values with: echo -n 'your-value' | base64
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: kubeoracle-secrets
  namespace: kubeoracle
type: Opaque
data:
  # echo -n 'your-anthropic-key' | base64
  ANTHROPIC_API_KEY: eW91ci1hbnRocm9waWMta2V5
  # echo -n 'postgres-password' | base64
  POSTGRES_PASSWORD: cG9zdGdyZXNwYXNz
  # echo -n 'redis-password' | base64
  REDIS_PASSWORD: cmVkaXNwYXNz

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: kubeoracle
type: Opaque
data:
  POSTGRES_USER: a3ViZW9yYWNsZQ==         # kubeoracle
  POSTGRES_PASSWORD: cG9zdGdyZXNwYXNz     # postgrespass
  POSTGRES_DB: a3ViZW9yYWNsZWRi           # kubeorarcledb
