# ─────────────────────────────────────────────────────────────
# KubeOracle – Prometheus Deployment (Kubernetes-native)
# Includes: Prometheus, kube-state-metrics scrape configs
# Retention: 72 hours
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kubeoracle-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s
      external_labels:
        cluster: 'kubeoracle-local'
        environment: 'demo'

    # ── Alerting Rules ──────────────────────────────────────
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # ── Prometheus self-monitoring ──────────────────────
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # ── KubeOracle Backend ──────────────────────────────
      - job_name: 'kubeoracle-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['kubeoracle']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      # ── Kubernetes Nodes ────────────────────────────────
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics

      # ── kube-state-metrics ──────────────────────────────
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']

      # ── cAdvisor (container metrics) ───────────────────
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      # ── metrics-server (for kubectl top) ────────────────
      - job_name: 'metrics-server'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['kube-system']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: metrics-server

  # ── Alerting Rules ──────────────────────────────────────
  kubeoracle-alerts.yml: |
    groups:
      - name: kubeoracle.rules
        interval: 30s
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been restarting frequently"

          - alert: HighCPUUsage
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="kubeoracle"}[2m]))
                by (pod) / sum(kube_pod_container_resource_limits{resource="cpu",namespace="kubeoracle"})
                by (pod) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.pod }}"

          - alert: HighMemoryUsage
            expr: |
              sum(container_memory_working_set_bytes{namespace="kubeoracle"})
                by (pod) / sum(kube_pod_container_resource_limits{resource="memory",namespace="kubeoracle"})
                by (pod) > 0.85
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.pod }}"

          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="false",namespace="kubeoracle"} == 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} not ready"

          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas{namespace="kubeoracle"}
                != kube_deployment_status_available_replicas{namespace="kubeoracle"}
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.deployment }} has wrong replica count"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: kubeoracle-monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=72h"       # 72-hour retention
            - "--storage.tsdb.retention.size=4GB"
            - "--web.enable-lifecycle"
            - "--web.enable-admin-api"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: kubeoracle-alerts.yml
                path: kubeoracle-alerts.yml
        - name: prometheus-storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kubeoracle-monitoring
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
      nodePort: 30090

---
# RBAC for Prometheus to discover pods/services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: kubeoracle-monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-role-binding
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: kubeoracle-monitoring
roleRef:
  kind: ClusterRole
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
