# ──── Analytics Service ──────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: kubeoracle
  labels:
    app: analytics-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: analytics-service
          image: busybox
          command: ["sh", "-c", "while true; do echo analytics running; sleep 30; done"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: kubeoracle
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8080
      targetPort: 8080
