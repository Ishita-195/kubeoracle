# ─────────────────────────────────────────────────────────────
# KubeOracle – Demo Microservices
# Realistic microservice topology for dependency visualization
# Includes: payment, auth, user, notification, inventory,
#           api-gateway, order-service, analytics
# ─────────────────────────────────────────────────────────────

# ──── API Gateway ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kubeoracle
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: SERVICE_NAME
              value: "api-gateway"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kubeoracle
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081

# ──── Payment Service ─────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: kubeoracle
  labels:
    app: payment-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: payment-service
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: SERVICE_NAME
              value: "payment-service"
            - name: UPSTREAM_AUTH
              value: "http://auth-service:8080"
            - name: UPSTREAM_ORDER
              value: "http://order-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: kubeoracle
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080

