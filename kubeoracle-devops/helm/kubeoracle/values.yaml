# ─────────────────────────────────────────────────────────────
# KubeOracle Helm Chart – values.yaml
# Override any of these with: helm install kubeoracle . -f my-values.yaml
# ─────────────────────────────────────────────────────────────

global:
  namespace: kubeoracle
  imageRegistry: ""           # e.g. "docker.io/yourusername" or leave blank for local

# ── Backend ──────────────────────────────────────────────────
backend:
  enabled: true
  image:
    repository: kubeoracle-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 3
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env:
    LOG_LEVEL: info
    ENVIRONMENT: production
  secrets:
    anthropicApiKey: ""       # Set via --set backend.secrets.anthropicApiKey=...
  service:
    type: ClusterIP
    port: 8000
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# ── Frontend ─────────────────────────────────────────────────
frontend:
  enabled: true
  image:
    repository: kubeoracle-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  service:
    type: NodePort
    port: 80
    nodePort: 30080

# ── PostgreSQL ───────────────────────────────────────────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage: 5Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  auth:
    database: kubeorarcledb
    username: kubeoracle
    password: ""              # Set via --set postgres.auth.password=...

# ── Redis ────────────────────────────────────────────────────
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  maxmemory: "256mb"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  auth:
    password: ""              # Set via --set redis.auth.password=...

# ── Prometheus ───────────────────────────────────────────────
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.51.0"
  retention: "72h"
  storageSize: "4GB"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  service:
    type: NodePort
    nodePort: 30090

# ── Demo Services ────────────────────────────────────────────
demoServices:
  enabled: true
  services:
    - name: payment-service
      replicas: 3
    - name: auth-service
      replicas: 2
    - name: user-service
      replicas: 3
    - name: order-service
      replicas: 2
    - name: notification-service
      replicas: 2
    - name: inventory-service
      replicas: 2
    - name: api-gateway
      replicas: 2

# ── Workload Generator ───────────────────────────────────────
workloadGenerator:
  enabled: true
  scenario: "random"
  duration: 300

# ── Ingress ──────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: kubeoracle.local
  tls: false
