# ─────────────────────────────────────────────────────────────
# KubeOracle – Workload Generator Pod
# Runs the workload_generator.py inside the cluster
# Needs kubectl access via RBAC
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-generator-sa
  namespace: kubeoracle

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workload-generator-role
  namespace: kubeoracle
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workload-generator-binding
  namespace: kubeoracle
subjects:
  - kind: ServiceAccount
    name: workload-generator-sa
roleRef:
  kind: Role
  name: workload-generator-role
  apiGroup: rbac.authorization.k8s.io

---
# Runs continuously on random scenario cycling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-generator
  namespace: kubeoracle
  labels:
    app: workload-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-generator
  template:
    metadata:
      labels:
        app: workload-generator
    spec:
      serviceAccountName: workload-generator-sa
      containers:
        - name: workload-generator
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              # Install Python3 and run the workload generator
              apk add --no-cache python3 2>/dev/null || apt-get install -y python3 2>/dev/null || true
              while true; do
                python3 /scripts/workload_generator.py --scenario random --duration 300
                sleep 60
              done
          env:
            - name: KUBEORACLE_NAMESPACE
              value: "kubeoracle"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: workload-scripts
              mountPath: /scripts
      volumes:
        - name: workload-scripts
          configMap:
            name: workload-generator-scripts
            defaultMode: 0755

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workload-generator-scripts
  namespace: kubeoracle
data:
  workload_generator.py: |
    # (embed the workload_generator.py content here at deploy time,
    #  or mount from a git-synced volume)
    print("Workload generator placeholder - replace with full script")
